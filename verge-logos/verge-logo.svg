<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 240 80"
     width="240" height="80"
     role="img"
     aria-label="verge">
  <title>verge</title>
  <defs>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5"/>
    </filter>
  </defs>
  <text x="18" y="55"
        font-family="'Hanken Grotesk', 'Inter', system-ui, -apple-system, sans-serif"
        font-weight="600"
        font-size="56"
        letter-spacing="-1.6"
        fill="#F4F3FA">verge</text>
  <!-- glow halo -->
  <rect x="172" y="18" width="5" height="36" rx="0.5"
        fill="#8770FF" opacity="0.55" filter="url(#glow)"/>
  <!-- bar -->
  <rect x="172" y="18" width="5" height="36" rx="0.5" fill="#8770FF"/>
</svg>
