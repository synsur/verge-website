<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     width="64" height="64"
     role="img"
     aria-label="verge">
  <title>verge</title>
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <clipPath id="square-clip">
      <rect x="0" y="0" width="64" height="64" rx="14" ry="14"/>
    </clipPath>
  </defs>
  <!-- dark background -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="#161223"/>
  <!-- glow, clipped to the rounded square -->
  <g clip-path="url(#square-clip)">
    <rect x="50" y="14" width="10" height="36" rx="1"
          fill="#8770FF" opacity="0.55" filter="url(#glow)"/>
  </g>
  <!-- bar -->
  <rect x="52" y="16" width="7" height="32" rx="1" fill="#8770FF"/>
</svg>
